<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16233B"/>
      <stop offset="0.55" stop-color="#0B1220"/>
      <stop offset="1" stop-color="#08101C"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.12" r="0.9">
      <stop offset="0" stop-color="#D4A857" stop-opacity="0.25"/>
      <stop offset="0.5" stop-color="#D4A857" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="coin" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F0CE86"/>
      <stop offset="0.5" stop-color="#D4A857"/>
      <stop offset="1" stop-color="#A9812F"/>
    </linearGradient>
    <linearGradient id="coinEdge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8C7239"/>
      <stop offset="1" stop-color="#6E5827"/>
    </linearGradient>
  </defs>

  <!-- full-bleed background (iOS applies its own rounded mask) -->
  <rect x="0" y="0" width="512" height="512" fill="url(#bg)"/>
  <rect x="0" y="0" width="512" height="512" fill="url(#glow)"/>

  <!-- coin -->
  <circle cx="256" cy="264" r="166" fill="url(#coinEdge)"/>
  <circle cx="256" cy="256" r="166" fill="url(#coin)"/>
  <circle cx="256" cy="256" r="138" fill="none" stroke="#8C7239" stroke-opacity="0.5" stroke-width="6"/>

  <!-- Arabic "م" (first letter of المصروف) -->
  <text x="256" y="272" text-anchor="middle" dominant-baseline="central"
        font-family="'Tajawal','Geeza Pro','Arial',sans-serif" font-weight="700"
        font-size="240" fill="#12192B">م</text>
</svg>
